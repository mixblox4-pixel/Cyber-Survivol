<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Survival Pro</title>
    <style>
        :root {
            --primary: #00f2ff;
            --bg: #0a0a0c;
            --ui-panel: rgba(20, 20, 25, 0.85);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            border: 2px solid #333;
        }

        canvas {
            display: block;
            background: radial-gradient(circle, #1a1a2e 0%, #0a0a0c 100%);
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            padding: 20px;
            box-sizing: border-box;
        }

        .stats {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--primary);
        }

        #menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--ui-panel);
            padding: 40px;
            text-align: center;
            border-radius: 10px;
            border: 1px solid var(--primary);
            backdrop-filter: blur(10px);
            pointer-events: all;
        }

        button {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px 30px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: var(--primary);
            color: black;
            box-shadow: 0 0 20px var(--primary);
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div class="stats">Score: <span id="scoreVal">0</span> | Level: <span id="levelVal">1</span></div>
        <div id="menu">
            <h1 style="color: var(--primary); margin-top: 0;">CYBER SURVIVAL</h1>
            <p>Use WASD para mover e Mouse para atirar.</p>
            <button onclick="startGame()">Iniciar Operação</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('scoreVal');
    const levelEl = document.getElementById('levelVal');
    const menu = document.getElementById('menu');

    canvas.width = 800;
    canvas.height = 600;

    let gameActive = false;
    let score = 0;
    let level = 1;
    let enemies = [];
    let projectiles = [];
    let particles = [];
    let keys = {};

    // Classes do Jogo
    class Player {
        constructor() {
            this.x = canvas.width / 2;
            this.y = canvas.height / 2;
            this.radius = 15;
            this.color = '#00f2ff';
            this.speed = 5;
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
            ctx.fill();
            ctx.closePath();
            ctx.shadowBlur = 0;
        }

        update() {
            if (keys['w'] && this.y > this.radius) this.y -= this.speed;
            if (keys['s'] && this.y < canvas.height - this.radius) this.y += this.speed;
            if (keys['a'] && this.x > this.radius) this.x -= this.speed;
            if (keys['d'] && this.x < canvas.width - this.radius) this.x += this.speed;
            this.draw();
        }
    }

    class Projectile {
        constructor(x, y, targetX, targetY) {
            this.x = x;
            this.y = y;
            this.radius = 4;
            this.color = '#fff';
            const angle = Math.atan2(targetY - y, targetX - x);
            this.velocity = { x: Math.cos(angle) * 10, y: Math.sin(angle) * 10 };
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
        }

        update() {
            this.x += this.velocity.x;
            this.y += this.velocity.y;
            this.draw();
        }
    }

    class Enemy {
        constructor() {
            this.radius = Math.random() * (20 - 10) + 10;
            if (Math.random() < 0.5) {
                this.x = Math.random() < 0.5 ? 0 - this.radius : canvas.width + this.radius;
                this.y = Math.random() * canvas.height;
            } else {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() < 0.5 ? 0 - this.radius : canvas.height + this.radius;
            }
            this.color = `hsl(${Math.random() * 360}, 50%, 50%)`;
            this.speed = (Math.random() * 2) + level * 0.5;
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        update() {
            const angle = Math.atan2(player.y - this.y, player.x - this.x);
            this.x += Math.cos(angle) * this.speed;
            this.y += Math.sin(angle) * this.speed;
            this.draw();
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.radius = Math.random() * 3;
            this.velocity = { x: (Math.random() - 0.5) * 5, y: (Math.random() - 0.5) * 5 };
            this.alpha = 1;
        }

        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.restore();
        }

        update() {
            this.x += this.velocity.x;
            this.y += this.velocity.y;
            this.alpha -= 0.02;
            this.draw();
        }
    }

    const player = new Player();

    function spawnEnemies() {
        if (!gameActive) return;
        enemies.push(new Enemy());
        setTimeout(spawnEnemies, 1000 / (1 + level * 0.1));
    }

    function animate() {
        if (!gameActive) return;
        requestAnimationFrame(animate);
        ctx.fillStyle = 'rgba(10, 10, 12, 0.2)'; // Efeito de rastro (Motion Blur)
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        player.update();

        particles.forEach((p, index) => {
            if (p.alpha <= 0) particles.splice(index, 1);
            else p.update();
        });

        projectiles.forEach((proj, pIndex) => {
            proj.update();
            // Remover projéteis fora da tela
            if (proj.x < 0 || proj.x > canvas.width || proj.y < 0 || proj.y > canvas.height) {
                projectiles.splice(pIndex, 1);
            }
        });

        enemies.forEach((enemy, eIndex) => {
            enemy.update();

            // Colisão Inimigo-Player (Game Over)
            const dist = Math.hypot(player.x - enemy.x, player.y - enemy.y);
            if (dist - enemy.radius - player.radius < 1) {
                endGame();
            }

            // Colisão Projétil-Inimigo
            projectiles.forEach((proj, pIndex) => {
                const pDist = Math.hypot(proj.x - enemy.x, proj.y - enemy.y);
                if (pDist - enemy.radius - proj.radius < 1) {
                    // Explosão
                    for (let i = 0; i < 8; i++) particles.push(new Particle(enemy.x, enemy.y, enemy.color));
                    
                    enemies.splice(eIndex, 1);
                    projectiles.splice(pIndex, 1);
                    score += 100;
                    scoreEl.innerHTML = score;
                    
                    if (score % 1000 === 0) {
                        level++;
                        levelEl.innerHTML = level;
                    }
                }
            });
        });
    }

    function startGame() {
        gameActive = true;
        score = 0;
        level = 1;
        enemies = [];
        projectiles = [];
        scoreEl.innerHTML = score;
        levelEl.innerHTML = level;
        menu.style.display = 'none';
        animate();
        spawnEnemies();
    }

    function endGame() {
        gameActive = false;
        menu.style.display = 'block';
        menu.innerHTML = `<h1 style="color: #ff4d4d">FALHA NA MISSÃO</h1>
                          <p>Score Final: ${score}</p>
                          <button onclick="location.reload()">Reiniciar Sistema</button>`;
    }

    // Inputs
    window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
    window.addEventListener('mousedown', (e) => {
        if (!gameActive) return;
        const rect = canvas.getBoundingClientRect();
        projectiles.push(new Projectile(player.x, player.y, e.clientX - rect.left, e.clientY - rect.top));
    });

</script>
</body>
</html>
